name: Mobile CI

on:
  push:
    branches: ["main", "develop"]
    paths:
      - "mobile/**"
  pull_request:
    paths:
      - "mobile/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
      - name: Install dependencies
        run: flutter pub get
        working-directory: mobile
      - name: Run tests
        run: flutter test
        working-directory: mobile
