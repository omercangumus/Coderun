name: Web CI

on:
  push:
    branches: ["main", "develop"]
    paths:
      - "web/**"
  pull_request:
    paths:
      - "web/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/coderun-web/package-lock.json
      - name: Install dependencies
        run: npm install
        working-directory: web/coderun-web
      - name: Lint
        run: npm run lint
        working-directory: web/coderun-web
      - name: Build
        run: npm run build
        working-directory: web/coderun-web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
