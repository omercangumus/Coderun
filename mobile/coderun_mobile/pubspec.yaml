name: coderun_mobile
description: Duolingo benzeri Python/DevOps/Cloud öğreten gamification platformu.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.0
  dio: ^5.4.3
  flutter_secure_storage: ^9.2.2
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  speech_to_text: ^7.3.0
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.2.2
  flutter_timezone: ^2.0.0
  timezone: ^0.9.4
  permission_handler: ^11.3.1
  intl: ^0.19.0
  shared_preferences: ^2.3.1
  cached_network_image: ^3.4.1
  lottie: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.12
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
